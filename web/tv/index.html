<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="supported-color-schemes" content="dark">
    <title>EutherPål TV</title>
    <link rel="stylesheet" href="/assets/styles.css">
    <script defer src="/assets/app.js"></script>
  </head>
  <body data-view="tv">
    <main class="tv-shell">
      <section class="board-wrap" aria-label="Spelplan">
        <div id="board" class="board"></div>
        <div class="board-center">
          <img class="bank-cat" src="/assets/bank/bank-cat.png" alt="Bankkatten">
          <p class="eyebrow">EutherPål</p>
          <h1>Banken</h1>
          <p id="bank-message">Startar testläge...</p>
          <div id="ai-turn-thought" class="ai-turn-thought" hidden></div>
          <div id="tv-auction" class="tv-auction"></div>
          <div id="free-parking-pot" class="free-parking-pot" aria-live="polite"></div>
          <div class="room-code">
            <span>Rumskod</span>
            <strong id="room-code">PAL-001</strong>
          </div>
        </div>
        <div id="game-over-screen" class="game-over-screen" hidden></div>
      </section>

      <aside class="side-panel">
        <section class="panel-block">
          <h2>Tur</h2>
          <p class="current-player" id="current-player">-</p>
          <p class="dice" id="dice">Tärning: -</p>
        </section>
        <section class="panel-block">
          <h2>Ruta</h2>
          <div id="tv-card" class="property-card"></div>
        </section>
        <section id="tv-token-panel" class="panel-block">
          <h2>Pjäser</h2>
          <div id="token-status" class="token-status"></div>
        </section>
        <section class="panel-block">
          <h2>Logg</h2>
          <ol id="tv-events" class="event-list"></ol>
        </section>
        <section class="panel-block">
          <h2>Spelare</h2>
          <div id="players" class="player-list"></div>
        </section>
        <section class="panel-block">
          <h2>Anslut telefon</h2>
          <p>Öppna <strong>/mobile</strong> och ange rumskoden.</p>
        </section>
      </aside>
    </main>
  </body>
</html>
