<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EutherPål Admin</title>
    <link rel="stylesheet" href="/assets/styles.css">
    <script defer src="/assets/app.js"></script>
  </head>
  <body data-view="admin">
    <main class="admin-shell">
      <header>
        <p class="eyebrow">EutherPål</p>
        <h1>Admin</h1>
      </header>

      <section class="control-panel">
        <h2>Driftstatus</h2>
        <dl class="status-grid">
          <dt>Server</dt>
          <dd id="admin-server">okänd</dd>
          <dt>AI</dt>
          <dd id="admin-ai">mock</dd>
          <dt>Rum</dt>
          <dd id="admin-room">-</dd>
        </dl>
      </section>

      <section class="control-panel">
        <h2>LLM-profil</h2>
        <form id="settings-form" class="settings-form">
          <label for="model-select">Modell</label>
          <select id="model-select" name="model">
            <option value="supergemma">supergemma</option>
            <option value="llama-local">llama-local</option>
            <option value="mistral-local">mistral-local</option>
            <option value="custom">custom</option>
          </select>

          <label for="preprompt-input">Preprompt</label>
          <textarea id="preprompt-input" name="preprompt" rows="14"></textarea>

          <div class="settings-actions">
            <button id="save-settings-button" type="submit">Spara settings</button>
            <span id="settings-status">Laddar settings...</span>
          </div>
        </form>
      </section>

      <section class="control-panel">
        <h2>TOML</h2>
        <p>Runtime-settings sparas i <strong id="settings-path">data/settings.toml</strong>. Regler och bräddata kan ligga i TOML så admin och AI kan ändra dem kontrollerat.</p>
      </section>
    </main>
  </body>
</html>
