<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="supported-color-schemes" content="dark">
    <title>EutherPål Admin</title>
    <link rel="stylesheet" href="/assets/styles.css">
    <script defer src="/assets/app.js"></script>
  </head>
  <body data-view="admin">
    <main class="admin-shell">
      <header>
        <p class="eyebrow">EutherPål</p>
        <h1>Admin</h1>
      </header>

      <section class="control-panel">
        <h2>Driftstatus</h2>
        <dl class="status-grid">
          <dt>Server</dt>
          <dd id="admin-server">okänd</dd>
          <dt>AI</dt>
          <dd id="admin-ai">mock</dd>
          <dt>Rum</dt>
          <dd id="admin-room">-</dd>
        </dl>
      </section>

      <section class="control-panel">
        <h2>Testverktyg</h2>
        <div class="admin-actions">
          <button id="admin-save-game" type="button">Spara spel</button>
          <button id="admin-load-game" type="button">Ladda spel</button>
          <button id="admin-demo-game" type="button">Demo-seed</button>
          <button id="admin-stop-game" class="danger-button" type="button">Stoppa spel</button>
          <label class="inline-control" for="admin-new-game-players">
            <span>Spelare</span>
            <select id="admin-new-game-players">
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4" selected>4</option>
              <option value="5">5</option>
            </select>
          </label>
          <label class="inline-control" for="admin-new-game-ai">
            <span>AI</span>
            <select id="admin-new-game-ai">
              <option value="0" selected>0</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
            </select>
          </label>
          <input id="admin-new-game-ai-names" maxlength="120" placeholder="AI-namn, kommaseparerat">
          <button id="admin-new-game" type="button">Nytt spel</button>
        </div>
        <form id="admin-adjust-form" class="settings-form compact-form">
          <label for="admin-adjust-player">Spelare</label>
          <select id="admin-adjust-player"></select>
          <label for="admin-cash-delta">Pengajustering</label>
          <input id="admin-cash-delta" type="number" value="0" step="100">
          <label for="admin-position">Position</label>
          <input id="admin-position" type="number" min="0" max="39" placeholder="0-39">
          <div class="settings-actions">
            <button type="submit">Justera</button>
            <span id="admin-tools-status">-</span>
          </div>
        </form>
      </section>

      <section class="control-panel">
        <h2>LLM-profil</h2>
        <form id="settings-form" class="settings-form">
          <label for="model-select">Modell</label>
          <select id="model-select" name="model">
            <option value="supergemma">supergemma</option>
            <option value="llama-local">llama-local</option>
            <option value="mistral-local">mistral-local</option>
            <option value="custom">custom</option>
          </select>

          <label for="preprompt-input">Preprompt</label>
          <textarea id="preprompt-input" name="preprompt" rows="14"></textarea>

          <label for="ai-turn-prompt-input">AI-spelarens turprompt</label>
          <textarea id="ai-turn-prompt-input" name="aiTurnPrompt" rows="8"></textarea>

          <label for="ai-profiles-input">AI-personligheter (TOML)</label>
          <textarea id="ai-profiles-input" name="aiProfilesToml" rows="14" spellcheck="false"></textarea>

          <div class="settings-actions">
            <button id="save-settings-button" type="submit">Spara settings</button>
            <span id="settings-status">Laddar settings...</span>
          </div>
        </form>
      </section>

      <section class="control-panel">
        <h2>Bankläge</h2>
        <div id="admin-bank-chat" class="bank-chat"></div>
        <form id="admin-bank-form" class="bank-chat-form">
          <input id="admin-bank-input" maxlength="280" placeholder="Skriv som banken/spelledaren..." autocomplete="off">
          <button type="submit">Svara</button>
        </form>
      </section>

      <section class="control-panel">
        <h2>TOML</h2>
        <p>Runtime-settings sparas i <strong id="settings-path">data/settings.toml</strong>. Regler och bräddata kan ligga i TOML så admin och AI kan ändra dem kontrollerat.</p>
      </section>
    </main>
  </body>
</html>
