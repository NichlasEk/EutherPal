<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EutherPål Mobil</title>
    <link rel="stylesheet" href="/assets/styles.css">
    <script defer src="/assets/app.js"></script>
  </head>
  <body data-view="mobile">
    <main class="phone-shell">
      <header class="phone-header">
        <p class="eyebrow">EutherPål</p>
        <h1>Spelarpanel</h1>
      </header>

      <section class="control-panel">
        <label for="room-input">Rumskod</label>
        <div class="join-row">
          <input id="room-input" value="PAL-001" inputmode="text">
          <button id="join-button" type="button">Gå med</button>
        </div>
        <label for="player-name-input">Ditt namn</label>
        <div class="join-row">
          <input id="player-name-input" autocomplete="name" maxlength="24" inputmode="text">
          <button id="save-name-button" type="button">Spara</button>
        </div>
        <div id="player-summary" class="player-summary"></div>
      </section>

      <section class="control-panel">
        <h2>Din tur</h2>
        <p id="mobile-status">Hämtar spelstatus...</p>
        <div id="mobile-card" class="property-card"></div>
        <div id="token-buttons" class="token-buttons"></div>
        <div id="auction-panel" class="auction-panel"></div>
        <div id="jail-panel" class="asset-panel"></div>
        <div id="build-panel" class="build-panel"></div>
        <div id="asset-panel" class="asset-panel"></div>
        <div class="action-grid">
          <button id="roll-button" type="button">Kasta tärning</button>
          <button id="buy-button" type="button">Köp fastighet</button>
          <button id="decline-button" type="button">Avstå</button>
          <button id="build-button" type="button">Bygg</button>
          <button id="ask-bank-button" type="button">Fråga banken</button>
        </div>
      </section>

      <section class="control-panel">
        <h2>Banken</h2>
        <p id="mobile-bank-message">-</p>
        <div id="bank-chat" class="bank-chat"></div>
        <form id="bank-chat-form" class="bank-chat-form">
          <input id="bank-chat-input" maxlength="280" placeholder="Fråga banken..." autocomplete="off">
          <button type="submit">Skicka</button>
        </form>
        <ol id="mobile-events" class="event-list"></ol>
      </section>
    </main>
  </body>
</html>
